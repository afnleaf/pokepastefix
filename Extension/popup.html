<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extension Options</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <script src="/lib/browser-polyfill.js"></script>
    <script src="/popup.js"></script>
</head>
<body>
    <header class="header">
        <img class="logo" src="assets/icons/icon32.png" alt="" width="32" height="32">
        <div class="header-text">
            <div class="title">pokepastefix</div>
            <div class="version"></div>
        </div>
    </header>
    <main class="options">
        <fieldset class="option">
            <legend>Image Quality:</legend>
            <small class="help">Low = 256px, Full = full size.</small>
            <div class="segmented">
                <input type="radio" id="imageQuality-0" name="imageQuality" value="0">
                <label for="imageQuality-0">Low</label>
                <input type="radio" id="imageQuality-1" name="imageQuality" value="1">
                <label for="imageQuality-1">Full</label>
            </div>
        </fieldset>
        <fieldset class="option">
            <legend>Replace All:</legend>
            <small class="help">No: only fix missing. Yes: replace every Pokemon.</small>
            <div class="segmented">
                <input type="radio" id="replaceAll-0" name="replaceAll" value="0">
                <label for="replaceAll-0">No</label>
                <input type="radio" id="replaceAll-1" name="replaceAll" value="1">
                <label for="replaceAll-1">Yes</label>
            </div>
        </fieldset>
        <fieldset class="option">
            <legend>Shiny:</legend>
            <small class="help">Off: none. On: follow paste. All: force all shiny.</small>
            <div class="segmented">
                <input type="radio" id="shiny-0" name="shiny" value="0">
                <label for="shiny-0">Off</label>
                <input type="radio" id="shiny-1" name="shiny" value="1">
                <label for="shiny-1">On</label>
                <input type="radio" id="shiny-2" name="shiny" value="2">
                <label for="shiny-2">All</label>
            </div>
        </fieldset>
        <fieldset class="option">
            <legend>Sprites:</legend>
            <small class="help">Pixel sprites matching the format's gen (1&ndash;5).</small>
            <div class="segmented">
                <input type="radio" id="sprites-0" name="sprites" value="0">
                <label for="sprites-0">Off</label>
                <input type="radio" id="sprites-1" name="sprites" value="1">
                <label for="sprites-1">On</label>
            </div>
        </fieldset>
    </main>
    <footer class="footer">
        <a class="kofi" href="https://ko-fi.com/afnleaf" target="_blank" rel="noopener noreferrer">
            <img src="assets/support_me_on_kofi_beige.png" alt="Support me on Ko-fi">
        </a>
    </footer>
</body>
</html>
